<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Admin{% endblock %}</title>

    <!-- Pico CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <style>
      body {
        padding: 2rem;
      }
      nav {
        margin-bottom: 2rem;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><strong>UXAR Admin</strong></li>
      </ul>
      <ul>
        <li><a href="/admin/greeting">Home</a></li>
        <li><a href="/admin/operations">Operations</a></li>
      </ul>
    </nav>

    <main class="container">
      {% block content %}
      <p>Welcome to the Admin Panel</p>
      {% endblock %}
    </main>

    <footer>
      <p>&copy; 2026 UXAR Admin. All rights reserved.</p>
    </footer>
  </body>
</html>
