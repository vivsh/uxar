{% extends "admin/layouts/base.html" %}
{% block content %}
<div class="drawer lg:drawer-open">
  <input id="admin-sidebar-toggle" type="checkbox" class="drawer-toggle" />
  <div class="drawer-content flex flex-col">
    <!-- Mobile: hamburger button -->
    <div class="lg:hidden p-3 bg-base-100 border-b border-base-300">
      <label for="admin-sidebar-toggle" class="btn btn-square btn-ghost btn-sm" aria-label="Open sidebar">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </label>
    </div>
    <!-- Page content -->
    <div class="p-4 lg:p-6">
      {% block main_content %}{% endblock %}
    </div>
  </div>
  <div class="drawer-side z-40">
    <label for="admin-sidebar-toggle" aria-label="Close sidebar" class="drawer-overlay"></label>
    <aside class="bg-base-100 w-64 min-h-full border-r border-base-300 p-4">
      {% block sidebar %}{% endblock %}
    </aside>
  </div>
</div>
{% endblock %}
