{% extends "admin/layouts/centered.html" %}

{% block title %}Login — UXAR Admin{% endblock %}

{% block main_content %}
<div class="card bg-base-100 shadow border border-base-300">
  <div class="card-body">
    <h2 class="card-title justify-center mb-4">UXAR Admin</h2>
    <form method="POST" action="/admin/login">
      <div class="mb-4">
        <label class="label" for="username"><span class="label-text font-medium">Username</span></label>
        <input type="text" id="username" name="username" class="input input-bordered w-full" placeholder="admin" required />
      </div>
      <div class="mb-6">
        <label class="label" for="password"><span class="label-text font-medium">Password</span></label>
        <input type="password" id="password" name="password" class="input input-bordered w-full" required />
      </div>
      <button type="submit" class="btn btn-primary w-full">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
