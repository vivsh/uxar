<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 705 670" role="img" aria-labelledby="title desc">
  <title id="title">Vyuh runtime infographic</title>
  <desc id="desc">Routes, tasks, signals, emitters, services, channels, commands, and console visibility around the Vyuh runtime core.</desc>
  <defs>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d130b" flood-opacity="0.12"/>
    </filter>
    <filter id="core-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#f45b19" flood-opacity="0.32"/>
    </filter>
    <linearGradient id="core-face" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffefa"/>
      <stop offset="0.58" stop-color="#fff9f0"/>
      <stop offset="1" stop-color="#fff0df"/>
    </linearGradient>
    <linearGradient id="core-side" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffc08f"/>
      <stop offset="0.42" stop-color="#ff985a"/>
      <stop offset="1" stop-color="#f45b19"/>
    </linearGradient>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="58%">
      <stop offset="0" stop-color="#f45b19" stop-opacity=".22"/>
      <stop offset=".55" stop-color="#f45b19" stop-opacity=".08"/>
      <stop offset="1" stop-color="#f45b19" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f45b19"/>
      <stop offset="1" stop-color="#ffc39a"/>
    </linearGradient>
    <style>
      .card{fill:rgba(255,255,255,.86);stroke:#eadfd4;stroke-width:1;filter:url(#soft-shadow)}
      .label{fill:#101828;font:600 16px Manrope,Avenir Next,Segoe UI,sans-serif}
      .note{fill:#374151;font:12px Manrope,Avenir Next,Segoe UI,sans-serif}
      .tiny{fill:#5f6673;font:9px Manrope,Avenir Next,Segoe UI,sans-serif}
      .micro{fill:#5f6673;font:8px Manrope,Avenir Next,Segoe UI,sans-serif}
      .metric{fill:#101828;font:700 14px Manrope,Avenir Next,Segoe UI,sans-serif}
      .ok{fill:#1d8f5c;font:9px Manrope,Avenir Next,Segoe UI,sans-serif}
      .bad{fill:#d92d20;font:9px Manrope,Avenir Next,Segoe UI,sans-serif}
      .line{fill:none;stroke:#ff6b2a;stroke-width:1.05;stroke-dasharray:3 4;stroke-linecap:round;opacity:.72}
      .icon-bg{fill:#fff0e8}
      .icon{fill:none;stroke:#4a2a16;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .icon-ember{fill:none;stroke:#f45b19;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
      .console-line{stroke:#eadfd4;stroke-width:1}
    </style>
  </defs>

  <g>
    <path class="line" d="M188 118 H293 Q311 118 311 136 V169"/>
    <path class="line" d="M352 80 V170"/>
    <path class="line" d="M516 118 H413 Q394 118 394 136 V169"/>
    <path class="line" d="M135 235 H274"/>
    <path class="line" d="M431 235 H570"/>
    <path class="line" d="M175 356 H295"/>
    <path class="line" d="M410 356 H539"/>
    <path class="line" d="M352 324 V415"/>
  </g>

  <g transform="translate(34 40)">
    <rect class="card" width="172" height="76" rx="10"/>
    <rect class="icon-bg" x="19" y="20" width="36" height="36" rx="5"/>
    <path class="icon-ember" d="M31 28c-5 5-5 13 0 18M43 28c5 5 5 13 0 18M37 32v10"/>
    <text class="label" x="70" y="35">Tasks</text>
    <text class="note" x="70" y="55">Background jobs</text>
  </g>

  <g transform="translate(270 12)">
    <rect class="card" width="166" height="76" rx="10"/>
    <rect class="icon-bg" x="18" y="20" width="36" height="36" rx="5"/>
    <circle class="icon" cx="36" cy="38" r="13"/>
    <path class="icon" d="M23 38h26M36 25c5 5 5 21 0 26M36 25c-5 5-5 21 0 26"/>
    <text class="label" x="67" y="35">Routes</text>
    <text class="note" x="67" y="55">HTTP APIs</text>
  </g>

  <g transform="translate(514 40)">
    <rect class="card" width="162" height="76" rx="10"/>
    <rect class="icon-bg" x="18" y="20" width="36" height="36" rx="5"/>
    <circle class="icon" cx="36" cy="38" r="13"/>
    <path class="icon" d="M36 29v10l7 4"/>
    <text class="label" x="67" y="35">Emitters</text>
    <text class="note" x="67" y="55">Scheduled jobs</text>
  </g>

  <g transform="translate(0 152)">
    <rect class="card" width="168" height="76" rx="10"/>
    <rect class="icon-bg" x="18" y="20" width="36" height="36" rx="5"/>
    <path class="icon" d="M22 34c8-8 21-8 29 0M27 40c5-5 14-5 19 0M33 46c2-2 5-2 7 0"/>
    <text class="label" x="67" y="35">Signals</text>
    <text class="note" x="67" y="55">In-process events</text>
  </g>

  <g transform="translate(536 152)">
    <rect class="card" width="166" height="76" rx="10"/>
    <rect class="icon-bg" x="18" y="20" width="36" height="36" rx="5"/>
    <path class="icon" d="m36 24 13 7v14l-13 7-13-7V31l13-7Z"/>
    <path class="icon" d="M23 31l13 7 13-7M36 38v14"/>
    <text class="label" x="67" y="35">Services</text>
    <text class="note" x="67" y="55">Long-running</text>
    <text class="note" x="67" y="70">components</text>
  </g>

  <g transform="translate(18 260)">
    <rect class="card" width="170" height="76" rx="10"/>
    <rect x="18" y="20" width="36" height="36" rx="5" fill="#3a2517"/>
    <path d="m30 31 8 7-8 7M41 47h9" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="label" x="67" y="35">Commands</text>
    <text class="note" x="67" y="55">Application actions</text>
  </g>

  <g transform="translate(548 260)">
    <rect class="card" width="154" height="76" rx="10"/>
    <rect class="icon-bg" x="18" y="20" width="36" height="36" rx="5"/>
    <path class="icon" d="M24 29h24v18H33l-9 7V29Z"/>
    <text class="label" x="67" y="35">Channels</text>
    <text class="note" x="67" y="55">Pub/Sub streams</text>
  </g>

  <g transform="translate(250 140)" filter="url(#core-shadow)">
    <ellipse cx="102" cy="118" rx="124" ry="78" fill="url(#core-glow)"/>
    <path d="M102 18 178 62v88l-76 44-76-44V62l76-44Z" fill="none" stroke="#f45b19" stroke-opacity=".2"/>
    <path d="M102 34 164 70v72l-62 36-62-36V70l62-36Z" fill="none" stroke="#f45b19" stroke-opacity=".3"/>
    <path d="M30 136 102 178 174 136v18l-72 42-72-42Z" fill="url(#core-side)" opacity=".82"/>
    <path d="M102 38 174 80v70l-72 42-72-42V80l72-42Z" fill="url(#core-face)" stroke="#ffc8a7"/>
    <image href="data:image/png;base64," x="67" y="81" width="70" height="70"/>
  </g>

  <g transform="translate(92 374)" filter="url(#soft-shadow)">
    <rect width="520" height="268" rx="11" fill="rgba(255,255,255,.9)" stroke="#eadfd4"/>
    <rect y="48" width="90" height="220" fill="rgba(255,245,238,.55)"/>
    <line class="console-line" x1="0" y1="48" x2="520" y2="48"/>
    <line class="console-line" x1="90" y1="48" x2="90" y2="268"/>
    <circle cx="490" cy="24" r="4" fill="#22a06b"/>
    <g transform="translate(20 17)" stroke="#f45b19" stroke-width="1.4" fill="none">
      <path d="M8 0 15 4v8l-7 4-7-4V4L8 0Z"/>
      <path d="m8 4 4 2v4l-4 2-4-2V6l4-2Z"/>
    </g>
    <text class="label" x="42" y="29">Console</text>
    <text class="tiny" x="22" y="70" fill="#f45b19">Overview</text>
    <text class="tiny" x="22" y="96">Operations</text>
    <text class="tiny" x="22" y="122">Tasks</text>
    <text class="tiny" x="22" y="148">Routes</text>
    <text class="tiny" x="22" y="174">Signals</text>
    <text class="tiny" x="22" y="200">Services</text>
    <text class="tiny" x="22" y="226">OpenAPI</text>
    <text class="tiny" x="22" y="252">Runtime</text>
    <rect x="14" y="58" width="64" height="24" rx="4" fill="#fff0e8"/>

    <g transform="translate(110 60)">
      <rect width="86" height="56" rx="5" fill="#fffdf8" stroke="#eadfd4"/>
      <text class="micro" x="12" y="17">Requests</text>
      <text class="metric" x="12" y="37">12.6k</text>
      <text class="ok" x="52" y="38">+8.1%</text>
    </g>
    <g transform="translate(206 60)">
      <rect width="86" height="56" rx="5" fill="#fffdf8" stroke="#eadfd4"/>
      <text class="micro" x="12" y="17">Tasks</text>
      <text class="metric" x="12" y="37">342</text>
      <text class="ok" x="52" y="38">+12.4%</text>
    </g>
    <g transform="translate(302 60)">
      <rect width="86" height="56" rx="5" fill="#fffdf8" stroke="#eadfd4"/>
      <text class="micro" x="12" y="17">Signals</text>
      <text class="metric" x="12" y="37">1.2k</text>
      <text class="ok" x="52" y="38">+5.7%</text>
    </g>
    <g transform="translate(398 60)">
      <rect width="92" height="56" rx="5" fill="#fffdf8" stroke="#eadfd4"/>
      <text class="micro" x="12" y="17">Uptime</text>
      <text class="metric" x="12" y="37">7d 14h</text>
      <text class="ok" x="62" y="38">100%</text>
    </g>

    <g transform="translate(110 132)">
      <rect width="178" height="112" rx="6" fill="#fffdf8" stroke="#eadfd4"/>
      <text class="tiny" x="14" y="24" fill="#101828">Recent Tasks</text>
      <circle cx="17" cy="48" r="3" fill="#22a06b"/><text class="micro" x="30" y="51">send-email</text><text class="ok" x="112" y="51">Completed</text>
      <circle cx="17" cy="72" r="3" fill="#22a06b"/><text class="micro" x="30" y="75">process-report</text><text class="ok" x="112" y="75">Running</text>
      <circle cx="17" cy="96" r="3" fill="#d92d20"/><text class="micro" x="30" y="99">sync-data</text><text class="bad" x="112" y="99">Failed</text>
    </g>
    <g transform="translate(306 132)">
      <rect width="184" height="112" rx="6" fill="#fffdf8" stroke="#eadfd4"/>
      <text class="tiny" x="14" y="24" fill="#101828">Top Routes</text>
      <text class="micro" x="14" y="51">POST /api/users</text><rect x="112" y="47" width="52" height="2" fill="url(#bar)"/><text class="micro" x="168" y="51">1.2k</text>
      <text class="micro" x="14" y="75">GET /api/posts</text><rect x="112" y="71" width="44" height="2" fill="url(#bar)"/><text class="micro" x="168" y="75">980</text>
      <text class="micro" x="14" y="99">POST /api/login</text><rect x="112" y="95" width="34" height="2" fill="url(#bar)"/><text class="micro" x="168" y="99">642</text>
    </g>
  </g>
</svg>
