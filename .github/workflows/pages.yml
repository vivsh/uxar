name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vyuh/web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix vyuh/web ci

      - name: Install mdBook
        run: cargo install mdbook --version 0.5.3 --locked

      - name: Build site
        run: bash scripts/build-pages.sh public

      - name: Deploy to vyuh-rs.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          external_repository: vyuh-rs/vyuh-rs.github.io
          publish_branch: main
          publish_dir: public
          personal_token: ${{ secrets.VYUH_PAGES_DEPLOY_TOKEN }}
          force_orphan: true
